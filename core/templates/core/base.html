{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="keywords" content="portfolio, django, projects, programming">
    <meta name="description"
        content="{% block meta_description %}Portfólio{% endblock meta_description %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meu Portfólio{% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
    {% block extra_css %}{% endblock extra_css %}
</head>
<body>
    <header>
        <h1>{% block header_title %}Seu Portfólio{% endblock header_title %}</h1>
    </header>

    <nav>
        <a href="{% url 'portfolio:home' %}">Início</a>
        <a href="{% url 'portfolio:projects' %}">Projetos</a>
        <a href="{% url 'portfolio:contact' %}">Contato</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock content %}
    </div>

    <footer>
        <p>© 2026 - Portfólio Acadêmico | UAST</p>
    </footer>
</body>
</html>
